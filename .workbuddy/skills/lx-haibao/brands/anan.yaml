brand_id: "anan"
canonical_name: "安安用车"
aliases: ["安安", "安安用车"]
filename_keywords: ["安安用车", "安安"]

assets:
  logo_path: "${SKILL_ROOT}/brand-assets/anan/logo.png"
  qr_path: "${SKILL_ROOT}/brand-assets/anan/qr.png"

display:
  poster_brand_name: "安安用车"
  forbidden_brand_text: []

output:
  filename_template: "{brand}-{city}-{timestamp}.png"
  overwrite_existing: true

qr_validation:
  validator_brand: "安安用车"
  expected_value: "https://t.honghusaas.com/q92R5lR"
  match_policy: "exact_decoded_value"

style_notes:
  - '品牌展示名写"安安用车"。'
  - '整体以绿色、白色为主，风格亲和、清楚、偏出行服务运营感。'
  - '顶部可保留安安用车 Logo、XX市专享活动和主标题"选安安用车 出行更安心"。'
  - '画面可保留白色轿车、城市背景，以及"从家到目的地 / 一口价更省心"气泡文案。'
  - '底部可保留绿色卖点栏，整体信息层级要清晰。'
