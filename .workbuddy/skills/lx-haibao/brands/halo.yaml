brand_id: "halo"
canonical_name: "哈啰"
aliases: ["哈啰", "哈啰轻快"]
filename_keywords: ["哈啰轻快", "哈啰"]

assets:
  logo_path: "${SKILL_ROOT}/brand-assets/halo/logo.png"
  qr_path: "${SKILL_ROOT}/brand-assets/halo/qr.png"

display:
  poster_brand_name: "哈啰"
  forbidden_brand_text: ["哈啰轻快"]

output:
  filename_template: "{brand}-{city}-{timestamp}.png"
  overwrite_existing: true

qr_validation:
  validator_brand: "哈啰"
  expected_value: "https://t.honghusaas.com/zEw6B9a"
  match_policy: "exact_decoded_value"

style_notes:
  - '品牌展示名只写"哈啰"，不得写"哈啰轻快"。'
  - '整体以蓝色、蓝白绿为主，风格清爽、直接、运营感强。'
  - '标题和角标应突出"哈啰"和城市司机活动。'
  - '画面适合使用城市道路、白色网约车、蓝绿信息卡片和轻量运营角标。'
