brand_id: "wangluyouxing"
canonical_name: "网路优行"
aliases: ["网路优行"]
filename_keywords: ["网路优行"]

assets:
  logo_path: "${SKILL_ROOT}/brand-assets/wangluyouxing/logo.png"
  qr_path: "${SKILL_ROOT}/brand-assets/wangluyouxing/qr.png"

logo_overlay:
  x_ratio: 0.05
  y_ratio: 0.025
  width_ratio: 0.14
  height_ratio: 0.07
  padding_ratio: 0.01

display:
  poster_brand_name: "网路优行"
  forbidden_brand_text: []

output:
  filename_template: "{brand}-{city}-{timestamp}.png"
  overwrite_existing: true

qr_validation:
  validator_brand: "网路优行"
  expected_value: "https://t.honghusaas.com/vZ1z2w8"
  match_policy: "exact_decoded_value"

style_notes:
  - '品牌展示名写"网路优行"。'
  - '整体以深蓝、酒红、白色为主，贴合网路优行 Logo 的深蓝斜角、红蓝车身流线和白底品牌露出。'
  - '画面适合使用城市道路、白色网约车、红蓝速度流线、深蓝信息栏和清晰运营活动模块。'
  - '标题和二维码区域要保持正式、稳重、司机活动海报感，避免使用过度卡通元素。'
