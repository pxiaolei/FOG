# FOG 模板更新白名单
# tools/export_template.py 只导出 managed_dirs / managed_files 中列出的内容。
# protected_paths 中的内容永不覆盖。

version: 1

managed_dirs:
  - ".workbuddy/skills/lxx_share"
  - ".workbuddy/skills/lx_shujuku"
  - ".workbuddy/skills/lx-txsaasdocs"
  - ".workbuddy/skills/lx-zhutichaibiao"
  - ".workbuddy/skills/lx-init"
  - ".workbuddy/skills/lx-haibao"
  - ".workbuddy/skills/lx-dapanribao"
  - ".workbuddy/skills/lx-biaogetongbu"
  - ".workbuddy/skills/lx-tongzhi"
  - ".workbuddy/skills/lx-nongfu"

managed_files:
  - ".gitignore"
  - "README.md"
  - "AGENT.md"
  - "docs/管理员维护说明.md"
  - "docs/模板更新与配置策略.md"
  - "tools/export_template.py"
  - "tools/fog.py"
  - "tools/windows/check.ps1"
  - "tools/windows/install.ps1"
  - "config/fog_config.yaml.example"
  - "config/template_manifest.yaml"
  - "workspace/01主体拆表/.gitkeep"
  - "workspace/01主体拆表/输入/.gitkeep"
  - "workspace/01主体拆表/输出/.gitkeep"
  - "workspace/01主体拆表/原表存档/.gitkeep"
  - "workspace/01主体拆表/处理日志/.gitkeep"
  - "workspace/03数据报表/日报/.gitkeep"
  - "workspace/03数据报表/周报/.gitkeep"
  - "workspace/03数据报表/月报/.gitkeep"
  - "workspace/03数据报表/其他/.gitkeep"
  - "workspace/04数据分析/.gitkeep"
  - "workspace/09端外海报图/产出图/.gitkeep"
  - "workspace/09端外海报图/元数据/.gitkeep"
  - "workspace/09端外海报图/临时图/.gitkeep"
  - "workspace/10表格同步/.gitkeep"
  - "workspace/10表格同步/待处理/.gitkeep"
  - "workspace/10表格同步/输出/.gitkeep"
  - "workspace/10表格同步/处理日志/.gitkeep"
  - "workspace/12农服协作/.gitkeep"
  - "workspace/12农服协作/待处理/.gitkeep"
  - "workspace/12农服协作/输出/.gitkeep"
  - "workspace/12农服协作/处理日志/.gitkeep"

protected_paths:
  - "config/fog_config.yaml"
  - "config/personal_config.yaml"
  - "config/personal_config.yaml.bak"
  - "config/database.yaml"
  - "config/码表"
  - ".workbuddy/skills/*/assets/config.yaml"
  - ".workbuddy/skills/*/assets/cache"
  - ".workbuddy/skills/*/assets/query_runs"
  - ".workbuddy/skills/*/assets/*cache*.json"
  - ".workbuddy/skills/*/assets/entity_cache.json"
  - ".workbuddy/skills/*/assets/dailyreport_cache.json"
  - ".workbuddy/skills/lx-haibao/output"
  - ".lx-init-report.md"
  - ".fog-update-report.md"
  - ".fog_backup"
  - "workspace"
  - ".workbuddy/skills/lx-hhdataimport"
  - ".workbuddy/skills/lx-lxdataimport"
  - ".workbuddy/skills/lx-hhgongbu"

ignored_patterns:
  - ".venv"
  - "*/.venv/*"
  - "__pycache__"
  - "*.pyc"
  - "*.pyo"
  - "*.log"
  - ".DS_Store"
  - "*.zip"
  - "*.docx"
  - "*.tmp"
  - "*.tmp.*"
  - "*.bak.*"
